<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>栈微课</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #eef2eb;
      color: #2a3520;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── 顶部标题栏 ── */
    .top-bar {
      background: #f4f8f0;
      border-bottom: 1px solid #ccdbc4;
      padding: 10px 22px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .top-bar h1 {
      font-size: 1.05rem;
      color: #2e4a28;
      font-weight: 700;
      letter-spacing: .03em;
    }
    /* 得分徽章 */
    .score-badge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .score-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: .82rem;
      font-weight: 600;
      color: #5a7250;
    }
    .score-item .val {
      font-size: 1rem;
      font-weight: 700;
    }
    .score-item.correct .val { color: #22a06b; }
    .score-item.wrong   .val { color: #e05555; }
    /* 倍速按钮组 */
    .speed-group {
      display: flex;
      gap: 4px;
      align-items: center;
      background: #e2ecdc;
      border-radius: 8px;
      padding: 3px;
    }
    .speed-btn {
      padding: 3px 9px;
      border: none;
      border-radius: 6px;
      font-size: .73rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #6a8860;
      font-family: inherit;
      transition: background .15s, color .15s;
    }
    .speed-btn.active {
      background: #f4f8f0;
      color: #2e4a28;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
    }

    /* ── 双栏布局 ── */
    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      flex: 1;
      min-height: 0;
    }

    /* ── 左侧：视频面板 ── */
    .video-panel {
      display: flex;
      flex-direction: column;
      background: #000;
      border-right: 1px solid #ccdbc4;
      overflow: hidden;
    }

    /* ── 视频容器 ── */
    .video-wrapper {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000;
    }

    video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    /* ── 视频底部状态栏 ── */
    .video-footer {
      padding: 7px 16px;
      background: #f4f8f0;
      border-top: 1px solid #ccdbc4;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    /* ── 答题蒙层 ── */
    .quiz-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(20, 40, 20, 0.50);
      backdrop-filter: blur(4px);
      z-index: 10;
      align-items: center;
      justify-content: center;
    }
    .quiz-overlay.active { display: flex; }

    /* ── 题卡 ── */
    .quiz-card {
      background: #f8fcf6;
      border: 1px solid #ccdbc4;
      border-radius: 18px;
      padding: 28px 32px 24px;
      width: min(560px, 94%);
      box-shadow: 0 16px 48px rgba(30,60,30,.14);
      animation: popIn .22s ease;
      overflow-y: auto;
      max-height: 90vh;
    }
    @keyframes popIn {
      from { transform: scale(.93); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .quiz-meta {
      font-size: .73rem;
      color: #7a9870;
      margin-bottom: 8px;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .quiz-question {
      font-size: 1.05rem;
      line-height: 1.75;
      font-weight: 700;
      color: #2a3520;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid #d8e8d0;
    }

    /* ── 选项按钮 ── */
    .options { display: flex; flex-direction: column; gap: 9px; }

    .option-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f2f7ee;
      border: 1.5px solid #ccdbc4;
      border-radius: 10px;
      padding: 11px 14px;
      cursor: pointer;
      font-size: .92rem;
      color: #2e4a28;
      text-align: left;
      transition: background .15s, border-color .15s, transform .1s;
      font-family: inherit;
    }
    .option-btn:hover:not(:disabled) {
      background: #e4f0de;
      border-color: #4a8c5c;
      transform: translateX(3px);
    }
    .option-btn:disabled { cursor: default; }

    .option-letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #d8ecd0;
      color: #3a7048;
      font-weight: 700;
      font-size: .82rem;
      flex-shrink: 0;
      transition: background .2s, color .2s;
    }

    /* 答对 / 答错 样式 */
    .option-btn.correct {
      background: #edfaf3;
      border-color: #22a06b;
    }
    .option-btn.correct .option-letter { background: #22a06b; color: #fff; }

    .option-btn.wrong {
      background: #fff0f0;
      border-color: #e05555;
    }
    .option-btn.wrong .option-letter { background: #e05555; color: #fff; }

    /* ── 结果栏 ── */
    .result-bar {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: .88rem;
      line-height: 1.6;
    }
    .result-bar.show { display: block; }
    .result-bar.ok  { background: #edfaf3; border: 1.5px solid #22a06b; color: #1a7a52; }
    .result-bar.err { background: #fff0f0; border: 1.5px solid #e05555; color: #b83232; }

    .result-bar .result-title {
      font-weight: 700;
      font-size: .95rem;
      margin-bottom: 5px;
    }

    /* ── 继续按钮 ── */
    .continue-btn {
      display: none;
      margin-top: 18px;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #4a8c5c, #2e6e48);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      font-family: inherit;
    }
    .continue-btn.show { display: block; }
    .continue-btn:hover { opacity: .88; transform: translateY(-1px); }

    /* ── 进度指示器 ── */
    .progress-bar {
      display: flex;
      gap: 7px;
      align-items: center;
    }
    .progress-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #ccdbc0;
      border: 2px solid #b4ccaa;
      transition: background .3s;
      cursor: default;
    }
    .progress-dot.answered { background: #22a06b; border-color: #22a06b; }
    .progress-dot.current  { background: #4a8c5c; border-color: #4a8c5c; }

    /* ── 提示标签 ── */
    .tip {
      font-size: .72rem;
      color: #7a9870;
    }

    /* ══════════════════════════════════
       右侧面板
    ══════════════════════════════════ */
    .right-panel {
      display: flex;
      flex-direction: column;
      background: #f4f8f0;
      overflow: hidden;
    }

    /* ── 标签页切换 ── */
    .panel-tabs {
      display: flex;
      border-bottom: 1px solid #ccdbc4;
      flex-shrink: 0;
      background: #e8f0e2;
    }
    .panel-tab {
      flex: 1;
      padding: 11px 0;
      text-align: center;
      font-size: .82rem;
      font-weight: 600;
      color: #7a9870;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      user-select: none;
    }
    .panel-tab.active {
      color: #3a7048;
      border-bottom-color: #4a8c5c;
      background: #f4f8f0;
    }

    /* ── AI 面板 ── */
    .ai-panel {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .ai-panel.hidden { display: none; }

    .ai-header {
      padding: 11px 14px;
      background: #eaf3e4;
      border-bottom: 1px solid #ccdbc4;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .ai-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4a8c5c, #2e6e48);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .ai-header-text h2 { font-size: .88rem; color: #2a3520; font-weight: 700; }
    .ai-header-text p  { font-size: .68rem; color: #7a9870; margin-top: 1px; }
    .ai-status {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22a06b;
      margin-left: auto;
      box-shadow: 0 0 6px rgba(34,160,107,.5);
      flex-shrink: 0;
    }

    /* ── 消息列表 ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: #c0d8b8 transparent;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #c0d8b8; border-radius: 2px; }

    .msg { display: flex; gap: 8px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .76rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.ai   .msg-avatar { background: linear-gradient(135deg, #4a8c5c, #2e6e48); }
    .msg.user .msg-avatar { background: #d8eccc; color: #3a7048; }

    .msg-bubble {
      padding: 9px 12px;
      border-radius: 12px;
      font-size: .83rem;
      line-height: 1.65;
      max-width: calc(100% - 38px);
      word-break: break-word;
    }
    .msg.ai .msg-bubble {
      background: #f0f7ec;
      border: 1px solid #ccdbc4;
      border-top-left-radius: 3px;
      color: #2a3520;
    }
    .msg.user .msg-bubble {
      background: linear-gradient(135deg, #4a8c5c, #2e6e48);
      border-top-right-radius: 3px;
      color: #fff;
    }

    /* ── 打字动画 ── */
    .typing-indicator {
      display: none;
      gap: 4px;
      align-items: center;
      padding: 9px 14px;
      background: #f0f7ec;
      border: 1px solid #ccdbc4;
      border-radius: 12px;
      border-top-left-radius: 3px;
    }
    .typing-indicator.show { display: flex; }
    .typing-indicator span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #90b890;
      animation: typingBounce 1.2s ease infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }
    @keyframes typingBounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── 快捷问题 ── */
    .quick-btns {
      padding: 7px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      border-top: 1px solid #ccdbc4;
      flex-shrink: 0;
      background: #edf5e8;
    }
    .quick-btn {
      padding: 4px 10px;
      background: #f4f8f0;
      border: 1px solid #ccdbc4;
      border-radius: 20px;
      color: #5a7a50;
      font-size: .72rem;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, color .15s, border-color .15s;
    }
    .quick-btn:hover { background: #deeede; color: #2e6e48; border-color: #4a8c5c; }

    /* ── 输入区域 ── */
    .chat-input-area {
      padding: 9px 12px;
      background: #f4f8f0;
      border-top: 1px solid #ccdbc4;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      background: #eef5ea;
      border: 1.5px solid #ccdbc4;
      border-radius: 10px;
      padding: 8px 11px;
      color: #2a3520;
      font-size: .83rem;
      font-family: inherit;
      resize: none;
      min-height: 36px;
      max-height: 90px;
      outline: none;
      transition: border-color .15s;
      line-height: 1.5;
    }
    .chat-input:focus { border-color: #4a8c5c; background: #f4f8f0; }
    .chat-input::placeholder { color: #98b890; }
    .send-btn {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #4a8c5c, #2e6e48);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity .15s, transform .1s;
    }
    .send-btn:hover { opacity: .85; transform: scale(1.06); }
    .send-btn svg { width: 14px; height: 14px; fill: #fff; }

    /* ══ 笔记面板 ══ */
    .note-panel {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .note-panel.active { display: flex; }

    .note-toolbar {
      padding: 8px 12px;
      background: #eaf3e4;
      border-bottom: 1px solid #ccdbc4;
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      align-items: center;
    }
    .note-tool-btn {
      padding: 4px 10px;
      border: 1px solid #ccdbc4;
      border-radius: 6px;
      background: #f4f8f0;
      color: #5a7a50;
      font-size: .75rem;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }
    .note-tool-btn:hover { background: #deeede; color: #2e6e48; }
    .note-hint { margin-left: auto; font-size: .68rem; color: #98b890; }

    .note-textarea {
      flex: 1;
      padding: 14px 16px;
      border: none;
      outline: none;
      resize: none;
      font-size: .85rem;
      line-height: 1.75;
      color: #2a3520;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f8fcf4;
    }
    .note-textarea::placeholder { color: #a8c8a0; }

    /* ══ 完成汇总弹窗 ══ */
    .summary-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(20,40,20,.38);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .summary-overlay.show { display: flex; }
    .summary-card {
      background: #f8fcf5;
      border-radius: 20px;
      padding: 32px 36px;
      width: min(500px, 92vw);
      box-shadow: 0 20px 60px rgba(30,60,30,.18);
      animation: popIn .25s ease;
      text-align: center;
    }
    .summary-emoji { font-size: 3rem; margin-bottom: 10px; }
    .summary-title { font-size: 1.3rem; font-weight: 800; color: #2a3520; margin-bottom: 6px; }
    .summary-sub   { font-size: .88rem; color: #7a9870; margin-bottom: 22px; }
    .summary-score {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 24px;
    }
    .summary-stat {
      background: #eef5e8;
      border-radius: 14px;
      padding: 14px 24px;
      min-width: 80px;
    }
    .summary-stat .num { font-size: 2rem; font-weight: 800; line-height: 1; }
    .summary-stat .lbl { font-size: .72rem; color: #7a9870; margin-top: 4px; }
    .summary-stat.ok  .num { color: #22a06b; }
    .summary-stat.err .num { color: #d45050; }
    .summary-stat.tot .num { color: #3a7048; }
    .summary-list {
      text-align: left;
      margin-bottom: 22px;
      max-height: 200px;
      overflow-y: auto;
    }
    .summary-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid #d8ead0;
      font-size: .82rem;
      color: #3a5030;
    }
    .summary-row:last-child { border-bottom: none; }
    .s-icon { width: 20px; height: 20px; border-radius: 50%; display:flex; align-items:center; justify-content:center; font-size:.7rem; flex-shrink:0; }
    .s-icon.ok  { background: #edfaf3; color: #22a06b; }
    .s-icon.err { background: #fff0f0; color: #e05555; }
    .summary-close {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #4a8c5c, #2e6e48);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s;
    }
    .summary-close:hover { opacity: .88; }

    /* ══════════════════════════════════
       编程练习模块
    ══════════════════════════════════ */
    .open-lab-btn {
      padding: 6px 14px;
      background: linear-gradient(135deg, #3a6c52, #2a5038);
      border: 1.5px solid #4a8c5c;
      border-radius: 8px;
      color: #fff;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity .15s;
      letter-spacing: .02em;
    }
    .open-lab-btn:hover { opacity: .86; }

    .summary-lab-btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #edf5e8;
      border: 1.5px solid #4a8c5c;
      border-radius: 12px;
      color: #2e6e48;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
      margin-bottom: 10px;
    }
    .summary-lab-btn:hover { background: #d8eccc; }

    /* 全屏覆盖层 */
    .code-lab-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,24,10,.65);
      backdrop-filter: blur(6px);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    .code-lab-overlay.show { display: flex; }

    .code-lab {
      background: #f4f8f0;
      border-radius: 18px;
      width: min(1120px, 97vw);
      height: min(720px, 94vh);
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 80px rgba(0,0,0,.28);
      overflow: hidden;
      animation: popIn .22s ease;
    }

    .code-lab-header {
      background: #2e4a28;
      color: #fff;
      padding: 13px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .code-lab-header h2 { font-size: .98rem; font-weight: 700; margin: 0; }

    .prob-tabs { display: flex; gap: 7px; margin-left: 16px; }
    .prob-tab {
      padding: 5px 16px;
      border: 1.5px solid rgba(255,255,255,.28);
      border-radius: 8px;
      background: transparent;
      color: rgba(255,255,255,.65);
      cursor: pointer;
      font-size: .8rem;
      font-weight: 600;
      font-family: inherit;
      transition: all .15s;
    }
    .prob-tab.active {
      background: rgba(255,255,255,.18);
      color: #fff;
      border-color: rgba(255,255,255,.6);
    }
    .code-lab-close {
      margin-left: auto;
      padding: 5px 14px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 8px;
      color: rgba(255,255,255,.75);
      cursor: pointer;
      font-size: .8rem;
      font-family: inherit;
      transition: background .15s;
    }
    .code-lab-close:hover { background: rgba(255,255,255,.22); }

    .code-lab-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* 左侧：题目描述 */
    .prob-desc {
      padding: 18px 20px;
      overflow-y: auto;
      border-right: 1px solid #ccdbc4;
      background: #f8fcf5;
      scrollbar-width: thin;
      scrollbar-color: #c0d8b8 transparent;
    }
    .prob-desc::-webkit-scrollbar { width: 4px; }
    .prob-desc::-webkit-scrollbar-thumb { background: #c0d8b8; border-radius: 2px; }

    .prob-title { font-size: 1.05rem; font-weight: 800; color: #2a3520; margin-bottom: 8px; }
    .prob-difficulty {
      display: inline-block;
      padding: 2px 11px;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .prob-difficulty.easy   { background: #e0f4ea; color: #22a06b; }
    .prob-difficulty.medium { background: #fff4e0; color: #d48806; }

<body>

  <script>
    // ============================================================
    //  ★ 可自定义区域：修改下方 quizData 即可替换题目
    //  每道题字段：
    //    time     : 触发时间（秒），视频播到此处自动暂停
    //    question : 题目文字
    //    options  : [A, B, C, D] 四个选项文字
    //    answer   : 正确答案索引，0=A 1=B 2=C 3=D
    //    explain  : 答题后显示的解析文字
    // ============================================================
    const quizData = [
      {
        time: 30,
        question: "栈（Stack）是一种具有什么特性的数据结构？",
        options: [
          "先进先出（FIFO）",
          "后进先出（LIFO）",
          "随机访问",
          "优先级排序"
        ],
        answer: 1,
        explain: "栈遵循「后进先出」(LIFO, Last In First Out) 原则，最后压入的元素最先弹出。"
      },
      {
        time: 75,
        question: "下列哪个操作是向栈中插入元素的正确术语？",
        options: [
          "enqueue（入队）",
          "insert（插入）",
          "push（压栈）",
          "append（追加）"
        ],
        answer: 2,
        explain: "向栈顶添加元素叫做 push（压栈），从栈顶取出元素叫做 pop（弹栈）。"
      },
      {
        time: 130,
        question: "用栈来检验括号是否匹配时，遇到右括号 ')' 应该执行什么操作？",
        options: [
          "直接压入栈中",
          "清空整个栈",
          "弹出栈顶元素并与之配对",
          "跳过不处理"
        ],
        answer: 2,
        explain: "遇到右括号时，从栈顶弹出一个元素，检查它是否与当前右括号匹配。若不匹配或栈为空，则括号不合法。"
      },
      {
        time: 180,
        question: "以下关于栈的说法，哪一项是错误的？",
        options: [
          "栈只能在一端（栈顶）进行插入和删除操作",
          "栈可以用数组或链表来实现",
          "栈中间的元素可以被直接访问",
          "空栈执行 pop 操作会发生下溢错误"
        ],
        answer: 2,
        explain: "栈不支持随机访问，只能访问栈顶元素。要取得中间元素，必须依次弹出上方所有元素。"
      },
      {
        time: 230,
        question: "递归函数的调用过程在底层是借助哪种结构来管理的？",
        options: [
          "队列（Queue）",
          "调用栈（Call Stack）",
          "堆（Heap）",
          "哈希表（Hash Table）"
        ],
        answer: 1,
        explain: "程序执行递归时，每次函数调用的参数、局部变量和返回地址都被压入「调用栈」，函数返回时依次弹出，体现了栈的 LIFO 特性。"
      },
      {
        time: 285,
        question: "将中缀表达式 3 + 4 × 2 转换为后缀表达式（逆波兰式）时，结果是？",
        options: [
          "3 4 2 × +",
          "3 4 + 2 ×",
          "+ 3 × 4 2",
          "3 + 4 × 2"
        ],
        answer: 0,
        explain: "按照运算符优先级，先处理乘法：4×2 变为 4 2 ×，再与 3 相加得 3 4 2 × +。利用栈可以将任意中缀表达式转换为后缀表达式。"
      }
    ];
    // ============================================================
    //  以下为逻辑代码，无需修改
    // ============================================================

    const video       = document.getElementById('mainVideo');
    const overlay     = document.getElementById('quizOverlay');
    const metaEl      = document.getElementById('quizMeta');
    const questionEl  = document.getElementById('quizQuestion');
    const optionsCont = document.getElementById('optionsContainer');
    const resultBar   = document.getElementById('resultBar');
    const resultTitle = document.getElementById('resultTitle');
    const resultExplain = document.getElementById('resultExplain');
    const continueBtn = document.getElementById('continueBtn');
    const progressBar = document.getElementById('progressBar');

    // 状态
    const answered = new Array(quizData.length).fill(false);
    let currentQuizIndex = -1;

    // 构建进度点
    quizData.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'progress-dot';
      dot.id = `dot-${i}`;
      progressBar.appendChild(dot);
    });

    // 时间监听
    video.addEventListener('timeupdate', () => {
      const t = video.currentTime;
      for (let i = 0; i < quizData.length; i++) {
        if (!answered[i] && t >= quizData[i].time && t < quizData[i].time + 1.5) {
          showQuiz(i);
          break;
        }
      }
    });

    function showQuiz(index) {
      currentQuizIndex = index;
      video.pause();

      const q = quizData[index];
      metaEl.textContent = `第 ${index + 1} 题 / 共 ${quizData.length} 题`;
      questionEl.textContent = q.question;

      // 更新进度点
      document.querySelectorAll('.progress-dot').forEach((d, i) => {
        d.classList.remove('current');
        if (i === index && !answered[i]) d.classList.add('current');
      });

      // 清空旧选项
      optionsCont.innerHTML = '';
      resultBar.className = 'result-bar';
      resultTitle.textContent = '';
      resultExplain.textContent = '';
      continueBtn.classList.remove('show');

      const letters = ['A', 'B', 'C', 'D'];
      q.options.forEach((text, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${text}</span>`;
        btn.addEventListener('click', () => selectAnswer(i));
        optionsCont.appendChild(btn);
      });

      overlay.classList.add('active');
    }

    function selectAnswer(selectedIndex) {
      const q = quizData[currentQuizIndex];
      const btns = optionsCont.querySelectorAll('.option-btn');

      // 禁用所有按钮
      btns.forEach(b => b.disabled = true);

      // 标记正确答案
      btns[q.answer].classList.add('correct');

      if (selectedIndex === q.answer) {
        resultBar.className = 'result-bar ok show';
        resultTitle.textContent = '✅ 回答正确！';
        resultExplain.textContent = q.explain;
        scoreCorrect++;
        summaryResults[currentQuizIndex] = true;
      } else {
        btns[selectedIndex].classList.add('wrong');
        resultBar.className = 'result-bar err show';
        resultTitle.textContent = '❌ 回答错误';
        resultExplain.textContent = `正确答案是 ${'ABCD'[q.answer]}。${q.explain}`;
        scoreWrong++;
        summaryResults[currentQuizIndex] = false;
      }
      updateScoreUI();

      answered[currentQuizIndex] = true;

      // 更新进度点
      const dot = document.getElementById(`dot-${currentQuizIndex}`);
      dot.classList.remove('current');
      dot.classList.add('answered');

      continueBtn.classList.add('show');
    }

    // 得分统计
    let scoreCorrect = 0, scoreWrong = 0;
    function updateScoreUI() {
      document.getElementById('scoreCorrect').textContent = scoreCorrect;
      document.getElementById('scoreWrong').textContent = scoreWrong;
    }

    function closeQuiz() {
      overlay.classList.remove('active');
      // 检查是否全部完成
      if (answered.every(Boolean)) {
        setTimeout(showSummary, 400);
      } else {
        video.play();
      }
    }

    // ── 倍速控制 ──
    function setSpeed(rate) {
      video.playbackRate = rate;
      document.querySelectorAll('.speed-btn').forEach(b => {
        b.classList.toggle('active', parseFloat(b.textContent) === rate);
      });
    }

    // ── 完成汇总 ──
    function showSummary() {
      const ok  = scoreCorrect;
      const err = scoreWrong;
      const tot = quizData.length;
      const pct = Math.round(ok / tot * 100);

`#include <stack>
#include <string>
using namespace std;

bool isValid(string s) {
    stack<char> st;
    for (char ch : s) {
        if (ch == '(' || ch == '{' || ch == '[') {
            st.push(ch);
        } else {
            if (st.empty()) return false;
            char top = st.top(); st.pop();

`#include <stack>
#include <vector>
using namespace std;

bool validateStackSequences(vector<int> pushed, vector<int> popped) {
    stack<int> st;
    int i = 0;
    for (int val : pushed) {
        st.push(val);
        while (!st.empty() && st.top() == popped[i]) {
            st.pop();
            i++;
        }
    }
    return st.empty();
}`,

        const line = (lines[i] || '').trim();
        const pass = line === String(tc.expected);
        const got  = line === 'true' ? true : line === 'false' ? false : line;
        return { pass, desc: tc.desc, expected: tc.expected, got,
                 error: (!line && stderr) ? stderr : null };
      });

      const passCount = results.filter(r => r.pass).length;
      const total     = results.length;
      const pct       = Math.round(passCount / total * 100);

      const header = document.getElementById('testResultsHeader');
      header.style.display = 'flex';
      const scoreEl = document.getElementById('testScore');
      scoreEl.textContent = `${passCount}/${total} 通过 · ${pct} 分`;
      scoreEl.className = 'test-score ' + (passCount === total ? 'full' : passCount === 0 ? 'zero' : 'partial');

      const area = document.getElementById('testResultsArea');
      area.innerHTML = results.map((r, i) => {
        let detail = `<span class="tc-label">测试点 ${i+1}：</span><code>${escHtml(r.desc)}</code>`;
        if (!r.pass) {
          if (r.error) {
            detail += `<br>🚨 运行时错误：<pre style="margin:4px 0 0;font-size:.76rem;color:#b83232;white-space:pre-wrap;word-break:break-all;">${escHtml(r.error.slice(0,300))}</pre>`;
          } else if (lines[i] === undefined) {
            detail += `<br>⚠️ 无输出（程序提前终止或缺少 return 语句）`;
          } else {
            detail += `<br>期望：<code>${escHtml(String(r.expected))}</code>&nbsp;&nbsp;实际输出：<code>${escHtml(String(r.got))}</code>`;
          }
        }
        return `<div class="test-case-row">
          <div class="tc-icon ${r.pass ? 'pass' : 'fail'}">${r.pass ? '✓' : '✗'}</div>
          <div class="tc-content">${detail}</div>
        </div>`;
      }).join('');

      document.getElementById('solBtnWrap').style.display = 'block';
      document.getElementById('testResultsHeader').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function renderError(title, msg) {
      const header = document.getElementById('testResultsHeader');
      header.style.display = 'flex';
      document.getElementById('testScore').textContent = '';
      document.getElementById('testScore').className = 'test-score zero';
      document.getElementById('testResultsArea').innerHTML = `<div class="test-case-row">
        <div class="tc-icon fail">✗</div>
        <div class="tc-content">
          <span class="tc-label">🚨 ${escHtml(title)}</span>
          <pre style="margin-top:6px;font-size:.78rem;color:#b83232;background:#fff0f0;padding:8px 10px;border-radius:6px;white-space:pre-wrap;word-break:break-all;max-height:180px;overflow-y:auto;">${escHtml(msg)}</pre>
        </div>
      </div>`;
      document.getElementById('solBtnWrap').style.display = 'block';
      header.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function toggleSolution() {
      const panel = document.getElementById('solutionPanel');
      const btn = document.getElementById('solBtn');
      const prob = codeProblems[currentProbIdx];
      if (!panel.classList.contains('show')) {
        panel.innerHTML = `<pre>${escHtml(prob.solution)}</pre><div class="sol-explain">${prob.explain.replace(/\n/g,'<br>')}</div>`;
        panel.classList.add('show');
        btn.textContent = '▲ 收起参考答案';
      } else {
        panel.classList.remove('show');
        panel.innerHTML = '';
        btn.textContent = '💡 查看参考答案与解析';
      }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Tab 键插入两个空格
    document.getElementById('codeEditor').addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = this.selectionStart;
        const end = this.selectionEnd;
        this.value = this.value.slice(0, start) + '  ' + this.value.slice(end);
        this.selectionStart = this.selectionEnd = start + 2;
      }
    });
  </script>
</body>
</html>
